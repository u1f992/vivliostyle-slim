name: release

on:
  push:
    tags:
      - "*-[0-9]+"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/u1f992/vivliostyle-slim
  CLI_REPO: vivliostyle/vivliostyle-cli
  TOOLING_PR: "793"
  PNPM_VERSION: "10.28.2"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      slim_version: ${{ steps.parse.outputs.slim_version }}
      cli_ref: ${{ steps.parse.outputs.cli_ref }}
      cli_version: ${{ steps.meta.outputs.cli_version }}
      browser: ${{ steps.meta.outputs.browser }}
    steps:
      - name: Parse release version
        id: parse
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          SLIM_VERSION="$RELEASE_VERSION"
          case "$SLIM_VERSION" in
            *-[0-9]*) ;;
            *) echo "::error::'$SLIM_VERSION' is not <cli-ref>-<revision> (e.g. v11.0.0-1)"; exit 1 ;;
          esac
          # cli ref (used verbatim) + packaging revision, split on the final hyphen.
          CLI_REF="${SLIM_VERSION%-*}"
          REVISION="${SLIM_VERSION##*-}"
          echo "slim_version=$SLIM_VERSION" >> "$GITHUB_OUTPUT"
          echo "cli_ref=$CLI_REF"           >> "$GITHUB_OUTPUT"
          echo "Slim $SLIM_VERSION = cli ref '$CLI_REF' + packaging revision $REVISION"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Enforce immutability of the release tag
        env:
          SLIM_VERSION: ${{ steps.parse.outputs.slim_version }}
        run: |
          if docker manifest inspect "${IMAGE_NAME}:${SLIM_VERSION}" >/dev/null 2>&1; then
            echo "::error::${IMAGE_NAME}:${SLIM_VERSION} already exists. Bump the packaging revision (e.g. -$(( ${SLIM_VERSION##*-} + 1 )))."
            exit 1
          fi
          echo "${IMAGE_NAME}:${SLIM_VERSION} is free."

      - name: Checkout vivliostyle-cli (metadata only)
        uses: actions/checkout@v6
        with:
          repository: ${{ env.CLI_REPO }}
          ref: ${{ steps.parse.outputs.cli_ref }}
          path: vivliostyle-cli

      - name: Read cli version and extract browser
        id: meta
        working-directory: vivliostyle-cli
        run: |
          CLI_VERSION=$(jq -r '.version' package.json)
          # Same extraction the upstream cd-workflow uses: the chrome entry of
          # DEFAULT_BROWSER_VERSIONS in src/constants.ts, linux key.
          BROWSER_VERSION=$(sed -n '/START DEFAULT_BROWSER_VERSIONS/,/END DEFAULT_BROWSER_VERSIONS/p' src/constants.ts \
            | grep -oP 'chrome:\s*\K\{[^}]+\}' | jq -r '.linux')
          echo "cli_version=$CLI_VERSION"       >> "$GITHUB_OUTPUT"
          echo "browser=chrome@$BROWSER_VERSION" >> "$GITHUB_OUTPUT"
          echo "cli_version=$CLI_VERSION  browser=chrome@$BROWSER_VERSION"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout vivliostyle-cli at the release ref
        uses: actions/checkout@v6
        with:
          repository: ${{ env.CLI_REPO }}
          ref: ${{ needs.prepare.outputs.cli_ref }}
          path: vivliostyle-cli

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Bump pnpm and regenerate the lockfile so it records libc
        working-directory: vivliostyle-cli
        run: |
          # The release ref's pnpm writes the lockfile without `libc`, so a glibc
          # host would install the musl natives too. `--fix-lockfile` makes pnpm
          # record `libc` -- it's the flag, not the pnpm version, that does this, so
          # PNPM_VERSION need not climb past 10.28.2 -- letting the Dockerfile's
          # foreign-platform prune drop the unused musl bindings.
          jq --arg v "$PNPM_VERSION" '
            .packageManager = "pnpm@\($v)"
            | (if .devDependencies.pnpm then .devDependencies.pnpm = $v else . end)
          ' package.json > package.json.tmp && mv package.json.tmp package.json
          npm install --global "pnpm@$PNPM_VERSION"
          pnpm install --lockfile-only --fix-lockfile --no-frozen-lockfile

      - name: Overlay the slim tooling from the PR head
        working-directory: vivliostyle-cli
        run: |
          git fetch https://github.com/${{ env.CLI_REPO }} pull/${{ env.TOOLING_PR }}/head
          # Quote the glob so git applies it as a pathspec against the fetched
          # tree (the working tree has no build/*.txt yet to expand against).
          git checkout FETCH_HEAD -- Dockerfile build/image-contract.sh build/audit.ts 'build/*.txt'

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Buildx with the security.insecure entitlement
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          buildkitd-flags: --allow-insecure-entitlement security.insecure

      - name: Build and push by digest (untagged)
        run: |
          # mmdebstrap runs a real root chroot and bind-mounts /proc,/sys,/dev for
          # the package maintainer scripts, which needs CAP_SYS_ADMIN + an
          # unconfined profile. The Dockerfile's `RUN --security=insecure` supplies
          # that, gated by the builder's --allow-insecure-entitlement above and the
          # --allow flag here.
          #
          # push-by-digest pushes an untagged, digest-only manifest -- GHCR has no
          # "remove tag, keep manifest", so per-arch images are never tagged; the
          # index assembled in the manifest job references them by digest.
          docker buildx build \
            --platform "linux/${{ matrix.arch }}" \
            --allow security.insecure \
            --build-arg VS_CLI_VERSION=${{ needs.prepare.outputs.cli_version }} \
            --build-arg BROWSER=${{ needs.prepare.outputs.browser }} \
            --output "type=image,name=${IMAGE_NAME},push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file "${RUNNER_TEMP}/metadata.json" \
            vivliostyle-cli
          DIGEST="$(jq -r '."containerimage.digest"' "${RUNNER_TEMP}/metadata.json")"
          mkdir -p digests
          printf '%s' "$DIGEST" > "digests/${{ matrix.arch }}"
          echo "Pushed ${IMAGE_NAME}@${DIGEST} (${{ matrix.arch }}, untagged)"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: digests/${{ matrix.arch }}
          if-no-files-found: error

  verify:
    needs: [prepare, build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Fetch build/image-contract.sh from the PR head
        run: |
          git init -q .
          git fetch --depth 1 https://github.com/${{ env.CLI_REPO }} pull/${{ env.TOOLING_PR }}/head
          git checkout FETCH_HEAD -- build/image-contract.sh

      - name: Download this architecture's digest
        uses: actions/download-artifact@v8
        with:
          name: digest-${{ matrix.arch }}
          path: digests

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Verify the image contract
        run: |
          # Each architecture runs on its native runner, so the contract tests
          # the real pushed bits without emulation. The manifest job needs this
          # one and both matrix legs must pass, so a contract failure on either
          # architecture blocks the multi-arch tag.
          DIGEST="$(cat "digests/${{ matrix.arch }}")"
          docker pull "${IMAGE_NAME}@${DIGEST}"
          IMAGE="${IMAGE_NAME}@${DIGEST}" ./build/image-contract.sh

      - name: Upload GUI preview screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: preview-screenshots-${{ matrix.arch }}
          path: build/screenshots/
          if-no-files-found: warn

  manifest:
    needs: [prepare, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: digests
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Assemble multi-arch manifest
        env:
          SLIM_VERSION: ${{ needs.prepare.outputs.slim_version }}
        run: |
          AMD64="$(cat digests/amd64)"
          ARM64="$(cat digests/arm64)"
          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.version=${SLIM_VERSION}" \
            --annotation "index:org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            -t "${IMAGE_NAME}:${SLIM_VERSION}" \
            "${IMAGE_NAME}@${AMD64}" "${IMAGE_NAME}@${ARM64}"
          docker buildx imagetools inspect "${IMAGE_NAME}:${SLIM_VERSION}"
